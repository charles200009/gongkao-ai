<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>公考AI助教</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#534AB7;--primary-light:#CECBF6;--primary-dark:#3C3489;--bg:#f5f5f8;--card:#fff;--text:#1a1a2e;--text2:#666;--border:#e8e8f0;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.header{background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header h1{font-size:17px;font-weight:500;flex:1}
.header .sub{font-size:11px;opacity:.8}
.chat-area{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:88%;padding:10px 14px;border-radius:var(--radius);font-size:14px;line-height:1.6;animation:fadeIn .3s}
.msg.user{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.bot{background:var(--card);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:var(--shadow)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.bot .teacher-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:500;margin:8px 0 4px}
.tag-hs{background:#EEEDFE;color:#534AB7}
.tag-gz{background:#E1F5EE;color:#0F6E56}
.tag-yd{background:#FAEEDA;color:#854F0B}
.tag-other{background:#F1EFE8;color:#5F5E5A}
.msg.bot .section-title{font-weight:500;color:var(--primary-dark);margin:10px 0 4px}
.msg.bot .highlight{background:#FFF3CD;padding:1px 6px;border-radius:4px;font-size:13px}
.msg.bot .loading-dots{display:flex;gap:4px;padding:4px 0}
.msg.bot .loading-dots span{width:8px;height:8px;background:var(--text2);border-radius:50%;animation:bounce 1.4s infinite ease-in-out}
.msg.bot .loading-dots span:nth-child(2){animation-delay:.2s}
.msg.bot .loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.input-area{display:flex;gap:8px;padding:10px 12px;background:var(--card);border-top:1px solid var(--border);align-items:flex-end;flex-shrink:0}
.input-area textarea{flex:1;border:1px solid var(--border);border-radius:20px;padding:10px 14px;font-size:14px;resize:none;outline:none;min-height:40px;max-height:80px;font-family:inherit}
.input-area textarea:focus{border-color:var(--primary)}
.btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--primary);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.btn:active{opacity:.7}
.btn-photo{background:#f0f0f5;color:var(--text)}
.btn-send{background:var(--primary)}
.btn-send:disabled{opacity:.4}
.teacher-card{margin:6px 0;padding:8px 12px;border-radius:8px;border-left:3px solid var(--primary);background:#fafafa}
.teacher-card .name{font-weight:500;font-size:13px;color:var(--primary-dark);margin-bottom:2px}
.teacher-card .content{font-size:13px;line-height:1.5}
.answer-block{margin:6px 0}
.answer-block .block-title{font-weight:500;font-size:13px;color:var(--primary-dark);margin:8px 0 4px}
.ai-analysis{background:#FFF8E1;border-radius:8px;padding:8px 12px;margin:6px 0;font-size:13px;line-height:1.5}
.tip-box{background:#FCEBEB;border-radius:8px;padding:8px 12px;margin:6px 0;font-size:13px;line-height:1.5}
.file-input{display:none}
.preview-img{max-width:100%;max-height:160px;border-radius:8px;margin:6px 0}
.system-msg{text-align:center;color:var(--text2);font-size:12px;padding:4px}
</style>
</head>
<body>

<div class="header">
  <div style="font-size:22px">📚</div>
  <div>
    <h1>公考AI助教</h1>
    <div class="sub">花生十三 · 高照 · 袁东 · 龙飞 · 粉笔名师堂</div>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="msg bot">
    <div style="font-size:15px;font-weight:500;margin-bottom:4px">🎯 公考AI助教已就绪</div>
    <div style="font-size:13px;line-height:1.5">
      支持拍题识别和文字提问。<br>
      自动匹配花生十三、高照等名师方法进行多维度解答。<br><br>
      <span style="color:var(--primary);font-weight:500">📷 点击下方相机图标拍照，或直接输入题目</span>
    </div>
  </div>
</div>

<div class="input-area">
  <button class="btn btn-photo" id="photoBtn" title="拍照/选图">📷</button>
  <input type="file" accept="image/*" capture="environment" class="file-input" id="fileInput">
  <textarea id="msgInput" placeholder="输入题目文字..." rows="1"></textarea>
  <button class="btn btn-send" id="sendBtn" disabled title="发送">➤</button>
</div>

<script>
// ========== 配置 ==========
const CONFIG = {
  apiKey: atob('c2stcGV0bXhyY3lsZ3hmaGlkaHdma3ZmYWJ6bW9kempub2N0bnN3ZnRwc3l1dHRlbXp0'),
  model: 'Qwen/Qwen3-VL-8B-Instruct',
  baseUrl: 'https://api.siliconflow.cn/v1/chat/completions',
  maxTokens: 1024,
};

// ========== 状态 ==========
let kb = null; // 知识库
let currentImage = null; // 当前上传的图片(base64)
let isLoading = false;

// ========== DOM引用 ==========
const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const photoBtn = document.getElementById('photoBtn');
const fileInput = document.getElementById('fileInput');

// ========== 加载知识库 ==========
async function loadKnowledgeBase() {
  try {
    const resp = await fetch('./knowledge.json');
    if (!resp.ok) throw new Error('加载失败');
    kb = await resp.json();
    console.log(`知识库已加载: ${kb.meta.total_files} 条, ${kb.meta.modules.length} 个模块`);
  } catch (e) {
    console.warn('知识库加载失败，将使用AI知识: ' + e.message);
  }
}

// ========== 工具函数 ==========
function addMessage(content, isUser = false) {
  const div = document.createElement('div');
  div.className = `msg ${isUser ? 'user' : 'bot'}`;
  div.innerHTML = content;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function showLoading() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'loadingMsg';
  div.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div><div style="font-size:12px;color:#888;margin-top:4px">AI思考中...</div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideLoading() {
  const el = document.getElementById('loadingMsg');
  if (el) el.remove();
}

// 图像压缩
function compressImage(base64, maxW = 1200, quality = .8) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxW) { h *= maxW/w; w = maxW; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.src = base64;
  });
}

// 调用硅基流动API
async function callAI(messages) {
  const resp = await fetch(CONFIG.baseUrl, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${CONFIG.apiKey}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: CONFIG.model,
      messages: messages,
      max_tokens: CONFIG.maxTokens,
      temperature: .7,
      stream: false
    })
  });
  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`API错误: ${resp.status} ${err.slice(0,100)}`);
  }
  const data = await resp.json();
  return data.choices[0].message.content;
}

// 查询知识库
function searchKB(module, question) {
  if (!kb) return '';
  const entries = kb.by_module[module] || [];
  if (!entries.length) return '';
  
  // 按教师分组，取每个教师最相关的内容
  const byTeacher = {};
  for (const e of entries) {
    if (!byTeacher[e.teacher]) byTeacher[e.teacher] = [];
    byTeacher[e.teacher].push(e.content || '');
  }
  
  let result = '';
  for (const [teacher, contents] of Object.entries(byTeacher)) {
    const combined = contents.join('\n').slice(0, 800);
    if (combined) {
      result += `\n【${teacher}的方法论】\n${combined}\n`;
    }
  }
  return result.slice(0, 3000);
}

// 识别题型
function detectModule(text) {
  const t = text;
  const patterns = [
    { kw: ['资料分析','GDP','增长率','比重','同比','环比','基期','现期','百分点','增速'], mod: '资料分析' },
    { kw: ['数量关系','工程','行程','利润','浓度','排列组合','概率','年龄','鸡兔同笼','牛吃草'], mod: '数量关系' },
    { kw: ['判断推理','逻辑','推理','削弱','加强','论证','前提','假设','翻译','三段论'], mod: '判断推理' },
    { kw: ['图形推理','图形','图推','立体','展开图','对称','旋转'], mod: '图形推理' },
    { kw: ['言语理解','主旨','意图','填入','排序','词语','成语','填空','中心理解'], mod: '言语理解' },
    { kw: ['申论','概括','对策','公文','大作文','材料分析','归纳'], mod: '申论' },
  ];
  for (const p of patterns) {
    if (p.kw.some(k => t.includes(k))) return p.mod;
  }
  return '判断推理'; // 默认
}

// 判断是哪种题型的提示词
function buildSystemPrompt(module, kbContent) {
  const teacherNames = {
    '资料分析': '花生十三（分配法/ABRX）、高照（3+2速算法）',
    '数量关系': '花生十三（方程法/特值法）、高照（理论实战）、宋捏捏',
    '判断推理': '花生十三（归因论证/逻辑基础）、高照（断言推理）、龙飞（图形推理）',
    '图形推理': '龙飞（立体展开图/十字定位法）、花生十三（图推系统）',
    '言语理解': '花生十三（结构分析法）、高照（言小语理论）',
    '申论': '袁东（方法实战班）、冰哥（归纳概括）、李崇立',
  };
  const teachers = teacherNames[module] || '花生十三、高照';
  
  return `你是一个专业的公考AI助教，精通${teachers}等名师的方法论。

【核心任务】
用户会发来一道公考题（可能是文字描述或图片），你需要：
1. 识别题型（属于${module}模块）
2. 调用以下知识库中对应名师的方法论
3. 生成2-3位老师的解题分析，各有侧重
4. 提供AI综合解析，对比不同方法的优劣
5. 标注易错点提醒

【回答格式要求】
严格按照以下格式输出，每个部分用明确的标记：

==题型识别==
[这里写明是什么题型]

==花生十三的方法==
[花生十三的解题思路、公式、口诀、步骤]

==高照的方法==
[高照的解题思路、技巧、公式]（如果模块涉及其他老师也依次列出）

==AI综合解析==
[对比不同老师的侧重点，给出综合判断，AI自己的思考补充]

==易错提醒==
[常见错误和注意事项]

【知识库参考内容】
以下是本模块相关名师方法论的摘要，请结合这些内容进行回答：
${kbContent || '（无知识库内容，请基于你的训练知识回答）'}

重要规则：
- 每个老师的方法必须至少输出3-5个要点或完整步骤
- AI综合解析要体现独立思考和对比分析
- 答案要准确、清晰、便于理解
- 如果题目涉及计算，必须给出完整的计算过程`;
}

// ========== 主要处理函数 ==========
async function handleQuestion(text, imageBase64) {
  if (isLoading) return;
  isLoading = true;
  sendBtn.disabled = true;
  
  try {
    // 先调用AI识别题目
    showLoading();
    
    let questionText = text;
    let identifyMsg = [];
    
    if (imageBase64) {
      // 有图片：先让AI看图片识别
      const compressed = await compressImage(imageBase64);
      identifyMsg = [
        { role: 'system', content: '你是一个公考题目识别助手。请仔细查看图片中的题目，完整、准确地提取出题目文字内容。如果图片中有选项，也要提取。只输出题目原文，不要额外解释。' },
        { role: 'user', content: [
          { type: 'image_url', image_url: { url: compressed } },
          { type: 'text', text: '请提取这张图片中的题目内容' }
        ]}
      ];
      
      hideLoading();
      showLoading();
      questionText = await callAI(identifyMsg);
      
      // 如果用户也打了字，结合两者
      if (text.trim()) {
        questionText = text + '\n' + questionText;
      }
    }
    
    // 检测题型和查询知识库
    const module = detectModule(questionText);
    const kbContent = searchKB(module, questionText);
    
    // 构建系统提示和用户问题
    const sysPrompt = buildSystemPrompt(module, kbContent);
    
    const answerMsg = [
      { role: 'system', content: sysPrompt },
      { role: 'user', content: `请解答这道${module}题：\n${questionText}` }
    ];
    
    hideLoading();
    showLoading();
    const answer = await callAI(answerMsg);
    
    // 展示结果
    hideLoading();
    displayAnswer(module, answer);
    
  } catch (e) {
    hideLoading();
    addMessage(`<div style="color:#D85A30">❌ ${e.message}</div>`);
    console.error(e);
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
    updateSendBtn();
  }
}

// 格式化展示答案
function displayAnswer(module, rawAnswer) {
  // 解析AI回答中的标记
  const sections = rawAnswer.split(/==(.+?)==/);
  let html = `<div style="font-weight:500;color:var(--primary-dark);margin-bottom:6px">🔍 ${module} · 解题分析</div>`;
  
  for (let i = 1; i < sections.length; i += 2) {
    const title = sections[i].trim();
    const content = sections[i + 1]?.trim() || '';
    if (!content) continue;
    
    const colorMap = {
      '题型识别': '#534AB7',
      '花生十三': '#534AB7',
      '高照': '#0F6E56',
      '袁东': '#854F0B',
      '龙飞': '#993556',
      '冰哥': '#185FA5',
      '粉笔名师堂': '#378ADD',
      'AI综合解析': '#EFA927',
      '易错提醒': '#D85A30',
      '综合解析': '#EFA927',
    };
    
    let bgColor = '#f5f5f8';
    if (title.includes('花生')) bgColor = '#EEEDFE';
    else if (title.includes('高照')) bgColor = '#E1F5EE';
    else if (title.includes('袁东') || title.includes('冰哥')) bgColor = '#FAEEDA';
    else if (title.includes('龙飞')) bgColor = '#FBEAF0';
    else if (title.includes('综合') || title.includes('AI')) bgColor = '#FFF8E1';
    else if (title.includes('易错')) bgColor = '#FCEBEB';
    
    const isTeacher = ['花生十三','高照','袁东','龙飞','冰哥','粉笔名师堂'].some(t => title.includes(t));
    const tagClass = isTeacher ? `tag-${title.includes('花生')?'hs':title.includes('高照')?'gz':title.includes('袁')||title.includes('冰')?'yd':'other'}` : '';
    
    html += `
      <div class="answer-block">
        ${isTeacher ? `<div class="teacher-tag ${tagClass}">${title}</div>` : `<div class="block-title">${title}</div>`}
        <div style="font-size:13px;line-height:1.6;background:${bgColor};border-radius:8px;padding:8px 12px;white-space:pre-wrap">${content}</div>
      </div>`;
  }
  
  // 如果AI没有按格式返回，直接显示原文
  if (sections.length < 3) {
    html = `<div style="font-weight:500;color:var(--primary-dark);margin-bottom:6px">🔍 ${module} · 多师解析</div>` +
           `<div style="font-size:13px;line-height:1.6;white-space:pre-wrap">${rawAnswer}</div>`;
  }
  
  addMessage(html);
}

// ========== UI事件 ==========
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 80) + 'px';
  updateSendBtn();
});

function updateSendBtn() {
  const hasText = msgInput.value.trim().length > 0;
  sendBtn.disabled = isLoading || (!hasText && !currentImage);
}

photoBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  
  // 压缩并预览
  const reader = new FileReader();
  reader.onload = async (ev) => {
    currentImage = ev.target.result;
    addMessage(`<img src="${currentImage}" class="preview-img" alt="题目图片"><div style="font-size:12px;color:var(--text2)">📷 已选择图片，点击发送开始识别</div>`, true);
    fileInput.value = '';
    updateSendBtn();
  };
  reader.readAsDataURL(file);
});

sendBtn.addEventListener('click', () => {
  const text = msgInput.value.trim();
  if (!text && !currentImage) return;
  
  // 显示用户消息
  if (text) addMessage(text, true);
  
  const img = currentImage;
  currentImage = null;
  msgInput.value = '';
  msgInput.style.height = 'auto';
  updateSendBtn();
  
  handleQuestion(text, img);
});

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});

// ========== 初始化 ==========
loadKnowledgeBase();

// 暴露API key (简单编码)
</script>
</body>
</html>
